<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FlowTrace 页面拖拽模板</title>
  <style>
    :root {
      --bg: #070b10;
      --panel: #101821;
      --panel-soft: #141d27;
      --panel-hover: #182331;
      --line: #273545;
      --line-soft: #1d2a38;
      --text: #dbe9ff;
      --muted: #8ea3bd;
      --accent: #6ea7d9;
      --accent-soft: rgba(110, 167, 217, 0.22);
      --shadow: rgba(0, 0, 0, 0.36);
      --radius: 7px;
      --tab-height: 32px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.5 "Microsoft YaHei", "Segoe UI", sans-serif;
    }

    body.dragging {
      cursor: grabbing;
      user-select: none;
    }

    .app {
      display: grid;
      grid-template-rows: 42px 1fr;
      height: 100%;
      min-width: 960px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line-soft);
      background: #080d13;
    }

    .toolbar-title {
      font-weight: 700;
      letter-spacing: 0;
    }

    .toolbar-note {
      color: var(--muted);
      font-size: 12px;
    }

    .workspace {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      gap: 8px;
      padding: 8px;
      overflow: hidden;
    }

    .workspace.has-right {
      grid-template-columns: minmax(0, 1fr) minmax(260px, 32vw);
    }

    .workspace.has-left {
      grid-template-columns: minmax(240px, 26vw) minmax(0, 1fr);
    }

    .workspace.has-bottom {
      grid-template-rows: minmax(0, 1fr) minmax(190px, 28vh);
    }

    .pane {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 10px 32px var(--shadow);
    }

    .pane[data-zone="left"] {
      grid-column: 1;
      grid-row: 1 / -1;
    }

    .workspace.has-left .pane[data-zone="main"] {
      grid-column: 2;
    }

    .pane[data-zone="main"] {
      grid-column: 1;
      grid-row: 1;
    }

    .pane[data-zone="right"] {
      grid-column: 2;
      grid-row: 1 / -1;
    }

    .pane[data-zone="bottom"] {
      grid-column: 1 / -1;
      grid-row: 2;
    }

    .tab-strip {
      position: relative;
      display: flex;
      align-items: flex-end;
      min-height: var(--tab-height);
      padding: 4px 6px 0;
      gap: 2px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
    }

    .tab {
      height: var(--tab-height);
      min-width: 104px;
      max-width: 170px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-bottom-color: transparent;
      border-radius: 6px 6px 0 0;
      background: var(--panel-soft);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: grab;
      transform: translateY(1px);
    }

    .tab.active {
      background: var(--panel);
      color: #eef6ff;
    }

    .tab:hover {
      background: var(--panel-hover);
    }

    .tab.drag-source {
      opacity: 0.28;
    }

    .tab-close {
      color: var(--muted);
      pointer-events: none;
    }

    .tab-placeholder {
      height: var(--tab-height);
      min-width: 104px;
      border: 1px dashed rgba(110, 167, 217, 0.5);
      border-bottom-color: transparent;
      border-radius: 6px 6px 0 0;
      background: rgba(110, 167, 217, 0.08);
      transform: translateY(1px);
    }

    .pane-body {
      min-height: 0;
      flex: 1;
      padding: 14px;
      overflow: auto;
      background: var(--panel);
    }

    .page-title {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 10px;
    }

    .page-title h2 {
      margin: 0;
      font-size: 15px;
    }

    .page-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .grid-preview {
      height: 100%;
      min-height: 260px;
      border: 1px solid var(--line-soft);
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        #1c1d1c;
      background-size: 18px 18px;
      position: relative;
      overflow: hidden;
    }

    .node {
      position: absolute;
      width: 150px;
      height: 58px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    .node.green {
      background: linear-gradient(#3d9b8b, #24776b);
    }

    .node.red {
      background: linear-gradient(#be4549, #9b1f25);
    }

    .line {
      position: absolute;
      height: 2px;
      background: rgba(210, 92, 96, 0.72);
      transform-origin: left center;
    }

    .line::after {
      content: "";
      position: absolute;
      right: -1px;
      top: -5px;
      width: 0;
      height: 0;
      border-left: 10px solid rgba(210, 92, 96, 0.86);
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }

    .dense-list {
      display: grid;
      gap: 8px;
    }

    .dense-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0c131c;
      padding: 10px 12px;
    }

    .dense-item strong {
      display: block;
      margin-bottom: 3px;
    }

    pre {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #090f16;
      color: #79ffa2;
      overflow: auto;
      max-height: 260px;
    }

    .dock-edge {
      position: absolute;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: opacity 120ms ease;
      background: var(--accent-soft);
      border: 1px solid rgba(110, 167, 217, 0.34);
      border-radius: 8px;
    }

    .dock-edge.visible {
      opacity: 1;
    }

    .dock-edge.top {
      left: 18%;
      right: 18%;
      top: 10px;
      height: 54px;
    }

    .dock-edge.bottom {
      left: 18%;
      right: 18%;
      bottom: 10px;
      height: 54px;
    }

    .dock-edge.left {
      left: 10px;
      top: 20%;
      bottom: 20%;
      width: 54px;
    }

    .dock-edge.right {
      right: 10px;
      top: 20%;
      bottom: 20%;
      width: 54px;
    }

    .floating-page {
      position: fixed;
      z-index: 30;
      width: 360px;
      max-width: 42vw;
      border: 1px solid rgba(110, 167, 217, 0.48);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 22px 60px rgba(0,0,0,0.45);
      pointer-events: none;
      overflow: hidden;
      transform: translate3d(-9999px, -9999px, 0);
    }

    .floating-tab {
      height: var(--tab-height);
      min-width: 118px;
      max-width: 170px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px 6px 0 0;
      font-weight: 700;
    }

    .floating-body {
      padding: 12px;
      min-height: 180px;
      background: var(--panel);
    }

    .floating-body .mini-line {
      height: 9px;
      border-radius: 999px;
      background: #233344;
      margin: 9px 0;
    }

    .floating-body .mini-line.short {
      width: 58%;
    }

    .floating-body .mini-line.long {
      width: 88%;
    }

    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-title">FlowTrace 页面拖拽模板</div>
      <div class="toolbar-note">验证：拖动标签时，标签与页面作为同一个实例移动</div>
      <div id="status" class="status">拖动任意标签开始</div>
    </header>
    <main id="workspace" class="workspace"></main>
  </div>

  <script>
    const pages = {
      project: { title: "项目结构", hint: "真实接入后读取用户项目结构。", type: "list" },
      onboarding: { title: "接入向导", hint: "选择目标项目、运行记录与配置文件。", type: "list" },
      run: { title: "运行视图", hint: "节点画布与数据传递箭头。", type: "graph" },
      watch: { title: "监视窗口", hint: "固化方法输入、输出与异常快照。", type: "watch" },
      detail: { title: "事件详情", hint: "上级输出与下级输入并列比对。", type: "json" },
      compare: { title: "运行对比", hint: "目标运行与基线运行差异。", type: "list" }
    };

    const state = {
      active: { main: "run", left: null, right: null, bottom: null, top: null },
      zones: {
        main: ["project", "onboarding", "run", "detail", "compare"],
        right: ["watch"],
        left: [],
        bottom: [],
        top: []
      },
      dragging: null
    };

    const workspace = document.getElementById("workspace");
    const status = document.getElementById("status");

    function render() {
      workspace.innerHTML = "";
      workspace.className = "workspace";
      if (state.zones.left.length) workspace.classList.add("has-left");
      if (state.zones.right.length) workspace.classList.add("has-right");
      if (state.zones.bottom.length) workspace.classList.add("has-bottom");

      for (const zone of ["top", "left", "main", "right", "bottom"]) {
        if (zone !== "main" && !state.zones[zone].length) continue;
        workspace.appendChild(renderPane(zone));
      }

      for (const edge of ["top", "right", "bottom", "left"]) {
        const hint = document.createElement("div");
        hint.className = `dock-edge ${edge}`;
        hint.dataset.edge = edge;
        workspace.appendChild(hint);
      }
    }

    function renderPane(zone) {
      const pane = document.createElement("section");
      pane.className = "pane";
      pane.dataset.zone = zone;

      const tabs = document.createElement("div");
      tabs.className = "tab-strip";
      tabs.dataset.zone = zone;
      pane.appendChild(tabs);

      for (const id of state.zones[zone]) {
        const tab = document.createElement("button");
        tab.className = `tab ${state.active[zone] === id ? "active" : ""}`;
        tab.dataset.id = id;
        tab.dataset.zone = zone;
        tab.type = "button";
        tab.innerHTML = `<span>${pages[id].title}</span><span class="tab-close">x</span>`;
        tab.addEventListener("pointerdown", startDrag);
        tab.addEventListener("click", () => {
          state.active[zone] = id;
          render();
        });
        tabs.appendChild(tab);
      }

      tabs.addEventListener("pointermove", updateTabPlaceholder);
      tabs.addEventListener("pointerup", finishDrag);

      const body = document.createElement("div");
      body.className = "pane-body";
      body.dataset.zone = zone;
      body.addEventListener("pointermove", updateDockPreview);
      body.addEventListener("pointerup", finishDrag);
      pane.appendChild(body);

      const activeId = state.active[zone] || state.zones[zone][0];
      if (activeId) {
        state.active[zone] = activeId;
        body.appendChild(renderPage(activeId));
      }

      return pane;
    }

    function renderPage(id) {
      const page = pages[id];
      const wrap = document.createElement("article");
      wrap.className = "page";
      wrap.innerHTML = `
        <div class="page-title">
          <h2>${page.title}</h2>
          <span>${page.hint}</span>
        </div>
      `;

      if (page.type === "graph") {
        const graph = document.createElement("div");
        graph.className = "grid-preview";
        graph.innerHTML = `
          <div class="node red" style="left:8%;top:18%">service</div>
          <div class="node red" style="left:52%;top:14%">api</div>
          <div class="node green" style="left:30%;top:48%">workflow</div>
          <div class="node green" style="left:56%;top:50%">frontend</div>
          <div class="line" style="left:20%;top:25%;width:34%;transform:rotate(-4deg)"></div>
          <div class="line" style="left:45%;top:55%;width:18%;transform:rotate(0deg)"></div>
        `;
        wrap.appendChild(graph);
        return wrap;
      }

      if (page.type === "json" || page.type === "watch") {
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify({
          input: { form: { amount: "42.50", coupon_id: "WELCOME", permissions: ["read", "write"], user_id: 123 } },
          output: page.type === "watch" ? null : { order_id: "ord_001", status: "validated" },
          error: page.type === "watch" ? "ValueError: user_id is required" : null
        }, null, 2);
        wrap.appendChild(pre);
        return wrap;
      }

      const list = document.createElement("div");
      list.className = "dense-list";
      list.innerHTML = `
        <div class="dense-item"><strong>${page.title}.scan</strong><span>入口候选、模块边界、声明方法。</span></div>
        <div class="dense-item"><strong>${page.title}.trace</strong><span>运行记录、参数快照、异常位置。</span></div>
        <div class="dense-item"><strong>${page.title}.review</strong><span>低密度页面会收敛为更紧凑的信息块。</span></div>
      `;
      wrap.appendChild(list);
      return wrap;
    }

    function startDrag(event) {
      if (event.button !== 0) return;
      const tab = event.currentTarget;
      const id = tab.dataset.id;
      const zone = tab.dataset.zone;
      const rect = tab.getBoundingClientRect();
      const pane = tab.closest(".pane");
      const paneRect = pane.getBoundingClientRect();

      state.dragging = {
        id,
        fromZone: zone,
        pointerId: event.pointerId,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top,
        targetZone: zone,
        insertIndex: state.zones[zone].indexOf(id),
        dock: null,
        rectWidth: rect.width,
        paneWidth: Math.min(420, paneRect.width)
      };

      tab.classList.add("drag-source");
      tab.setPointerCapture(event.pointerId);
      document.body.classList.add("dragging");
      createFloatingPreview(id, rect.width);
      updateFloatingPreview(event);
      createPlaceholder(tab, rect.width);
      status.textContent = `${pages[id].title} 页面正在随标签移动`;
      event.preventDefault();
    }

    function createFloatingPreview(id, tabWidth) {
      removeFloatingPreview();
      const ghost = document.createElement("div");
      ghost.className = "floating-page";
      ghost.innerHTML = `
        <div class="floating-tab" style="width:${Math.max(118, tabWidth)}px">${pages[id].title}</div>
        <div class="floating-body">
          <strong>${pages[id].title}</strong>
          <div class="mini-line long"></div>
          <div class="mini-line"></div>
          <div class="mini-line short"></div>
        </div>
      `;
      document.body.appendChild(ghost);
    }

    function createPlaceholder(tab, width) {
      removePlaceholder();
      const placeholder = document.createElement("div");
      placeholder.className = "tab-placeholder";
      placeholder.style.minWidth = `${width}px`;
      tab.parentElement.insertBefore(placeholder, tab.nextSibling);
    }

    function updateFloatingPreview(event) {
      const ghost = document.querySelector(".floating-page");
      if (!ghost || !state.dragging) return;
      const x = event.clientX - state.dragging.offsetX;
      const y = event.clientY - state.dragging.offsetY;
      ghost.style.transform = `translate3d(${x}px, ${y}px, 0)`;
    }

    function updateTabPlaceholder(event) {
      if (!state.dragging) return;
      updateFloatingPreview(event);
      const strip = event.currentTarget.closest(".tab-strip") || event.currentTarget;
      const zone = strip.dataset.zone;
      const placeholder = document.querySelector(".tab-placeholder");
      if (!placeholder) return;
      state.dragging.targetZone = zone;
      state.dragging.dock = null;
      clearDockHints();

      const tabs = [...strip.querySelectorAll(".tab:not(.drag-source)")];
      let before = null;
      let insertIndex = 0;
      for (const candidate of tabs) {
        const rect = candidate.getBoundingClientRect();
        if (event.clientX < rect.left + rect.width / 2) {
          before = candidate;
          break;
        }
        insertIndex += 1;
      }
      strip.insertBefore(placeholder, before);
      state.dragging.insertIndex = insertIndex;
    }

    function updateDockPreview(event) {
      if (!state.dragging) return;
      updateFloatingPreview(event);
      const pane = event.currentTarget.closest(".pane");
      const rect = pane.getBoundingClientRect();
      const edge = edgeFromPointer(event, rect);
      clearDockHints();
      state.dragging.dock = edge;
      if (edge) {
        workspace.querySelector(`.dock-edge.${edge}`)?.classList.add("visible");
        status.textContent = `${pages[state.dragging.id].title} 释放后停靠到${edgeLabel(edge)}`;
      }
    }

    function edgeFromPointer(event, rect) {
      const x = event.clientX;
      const y = event.clientY;
      const horizontalMiddle = x > rect.left + rect.width * 0.2 && x < rect.right - rect.width * 0.2;
      const verticalMiddle = y > rect.top + rect.height * 0.2 && y < rect.bottom - rect.height * 0.2;
      if (horizontalMiddle && y < rect.top + 54) return "top";
      if (horizontalMiddle && y > Math.min(rect.bottom, window.innerHeight) - 54) return "bottom";
      if (verticalMiddle && x < rect.left + 54) return "left";
      if (verticalMiddle && x > rect.right - 54) return "right";
      return null;
    }

    function finishDrag(event) {
      if (!state.dragging) return;
      updateFloatingPreview(event);
      const drag = state.dragging;
      if (drag.dock) {
        moveToZone(drag.id, drag.dock);
        status.textContent = `${pages[drag.id].title} 已停靠到${edgeLabel(drag.dock)}`;
      } else {
        moveToZone(drag.id, drag.targetZone, drag.insertIndex);
        status.textContent = `${pages[drag.id].title} 已移动到${zoneLabel(drag.targetZone)}标签组`;
      }
      cleanupDrag();
      render();
    }

    function moveToZone(id, zone, index = null) {
      for (const key of Object.keys(state.zones)) {
        state.zones[key] = state.zones[key].filter((item) => item !== id);
        if (state.active[key] === id) state.active[key] = state.zones[key][0] || null;
      }
      const target = state.zones[zone] || state.zones.main;
      const safeIndex = index === null ? target.length : Math.max(0, Math.min(index, target.length));
      target.splice(safeIndex, 0, id);
      state.active[zone] = id;
    }

    function cleanupDrag() {
      document.body.classList.remove("dragging");
      state.dragging = null;
      clearDockHints();
      removeFloatingPreview();
      removePlaceholder();
      document.querySelectorAll(".drag-source").forEach((item) => item.classList.remove("drag-source"));
    }

    function removeFloatingPreview() {
      document.querySelector(".floating-page")?.remove();
    }

    function removePlaceholder() {
      document.querySelector(".tab-placeholder")?.remove();
    }

    function clearDockHints() {
      document.querySelectorAll(".dock-edge.visible").forEach((item) => item.classList.remove("visible"));
    }

    function zoneLabel(zone) {
      return { main: "主区域", left: "左侧区域", right: "右侧区域", bottom: "下方区域", top: "上方区域" }[zone] || "主区域";
    }

    function edgeLabel(edge) {
      return { top: "上方", right: "右侧", bottom: "下方", left: "左侧" }[edge] || "当前区域";
    }

    window.addEventListener("pointermove", (event) => {
      if (!state.dragging) return;
      updateFloatingPreview(event);
    });

    window.addEventListener("pointerup", finishDrag);
    render();
  </script>
</body>
</html>
